
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F5A623;
    --gold-light: #FFD580;
    --dark: #1a1a2e;
    --mid: #16213e;
    --accent: #e94560;
    --text: #f0f0f0;
    --text-muted: #9a9abf;
    --green: #2ecc71;
    --radius: 12px;
  }

  body { background: transparent; }

  #app {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: 20px;
    padding: 28px 28px 32px;
    color: var(--text);
    min-height: 500px;
    position: relative;
    overflow: hidden;
  }

  #app::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 0%, rgba(229,69,96,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 100%, rgba(245,166,35,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,166,35,0.4);
    line-height: 1;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }

  .panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius);
    padding: 20px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus {
    border-color: var(--gold);
    background: rgba(245,166,35,0.08);
  }

  .form-group input::placeholder { color: rgba(255,255,255,0.25); }

  .btn-add {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #e8941f);
    border: none;
    border-radius: 8px;
    padding: 11px;
    color: #1a1a2e;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-add:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(245,166,35,0.4);
  }

  .btn-add:active { transform: scale(0.98); }

  .participants-list {
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(245,166,35,0.3) transparent;
  }

  .participant-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    margin-bottom: 7px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .p-name { font-size: 14px; font-weight: 500; }

  .p-coupons {
    background: rgba(245,166,35,0.2);
    color: var(--gold);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .p-remove {
    background: none;
    border: none;
    color: rgba(255,255,255,0.25);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .p-remove:hover { color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 30px 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  .total-coupons {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 12px;
    text-align: right;
  }

  .total-coupons span { color: var(--gold); font-weight: 600; }

  .raffle-section {
    margin-top: 20px;
    grid-column: 1 / -1;
    text-align: center;
  }

  .btn-raffle {
    background: linear-gradient(135deg, var(--accent), #c0392b);
    border: none;
    border-radius: 10px;
    padding: 14px 36px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-raffle:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(233,69,96,0.45);
  }

  .btn-raffle:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ROULETTE OVERLAY */
  #roulette-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,30,0.97);
    border-radius: 20px;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  #roulette-overlay.active { display: flex; }

  .roulette-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 24px;
    text-align: center;
  }

  .roulette-window {
    width: 320px;
    height: 200px;
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    border: 2px solid rgba(245,166,35,0.4);
  }

  .roulette-window::before,
  .roulette-window::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 60px;
    z-index: 10;
    pointer-events: none;
  }

  .roulette-window::before {
    top: 0;
    background: linear-gradient(to bottom, rgba(10,10,30,0.95), transparent);
  }

  .roulette-window::after {
    bottom: 0;
    background: linear-gradient(to top, rgba(10,10,30,0.95), transparent);
  }

  .roulette-highlight {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 54px;
    border-top: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    background: rgba(245,166,35,0.1);
    z-index: 5;
    pointer-events: none;
  }

  #roulette-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: absolute;
    width: 100%;
    will-change: transform;
  }

  .roulette-item {
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.5px;
    flex-shrink: 0;
    width: 100%;
    text-align: center;
    padding: 0 20px;
    transition: color 0.1s;
  }

  .roulette-item.center { color: var(--gold); }

  /* WINNER */
  #winner-screen {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,30,0.98);
    border-radius: 20px;
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
  }

  #winner-screen.active { display: flex; }

  .confetti-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    border-radius: 20px;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(560px) rotate(720deg); opacity: 0; }
  }

  .trophy {
    font-size: 72px;
    animation: trophyBounce 0.6s ease;
    margin-bottom: 8px;
  }

  @keyframes trophyBounce {
    0% { transform: scale(0) rotate(-15deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(5deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .winner-label {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    animation: fadeUp 0.5s 0.3s both;
  }

  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--gold);
    letter-spacing: 3px;
    text-shadow: 0 0 40px rgba(245,166,35,0.6);
    animation: fadeUp 0.5s 0.5s both;
    line-height: 1;
    margin-bottom: 6px;
  }

  .winner-coupons {
    font-size: 14px;
    color: var(--text-muted);
    animation: fadeUp 0.5s 0.7s both;
    margin-bottom: 28px;
  }

  .winner-coupons strong { color: var(--gold-light); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-reset {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 8px;
    padding: 10px 28px;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.5s 1s both;
  }

  .btn-reset:hover { border-color: var(--gold); color: var(--gold); }

  #error-msg {
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
    min-height: 16px;
  }
</style>

<div id="app">
  <div class="header">
    <h1>🎰 Sorteio</h1>
    <p>Registre participantes e inicie o sorteio</p>
  </div>

  <div class="layout">
    <div class="panel">
      <div class="panel-title">➕ Registrar Participante</div>
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="input-name" placeholder="Nome completo" maxlength="40" />
      </div>
      <div class="form-group">
        <label>Quantidade de Cupons</label>
        <input type="number" id="input-coupons" placeholder="Ex: 3" min="1" max="100" />
      </div>
      <div id="error-msg"></div>
      <button class="btn-add" onclick="addParticipant()">Registrar</button>
    </div>

    <div class="panel">
      <div class="panel-title">👥 Participantes</div>
      <div class="participants-list" id="list">
        <div class="empty-state">Nenhum participante ainda</div>
      </div>
      <div class="total-coupons" id="total-info" style="display:none">
        Total de cupons: <span id="total-count">0</span>
      </div>
    </div>

    <div class="raffle-section">
      <button class="btn-raffle" id="btn-raffle" onclick="startRaffle()" disabled>
        🎲 Iniciar Sorteio
      </button>
    </div>
  </div>

  <!-- Roulette overlay -->
  <div id="roulette-overlay">
    <div class="roulette-title">Sorteando...</div>
    <div class="roulette-window">
      <div class="roulette-highlight"></div>
      <div id="roulette-list"></div>
    </div>
  </div>

  <!-- Winner screen -->
  <div id="winner-screen">
    <div class="confetti-container" id="confetti"></div>
    <div class="trophy">🏆</div>
    <div class="winner-label">Parabéns ao vencedor</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-coupons" id="winner-coupons"></div>
    <button class="btn-reset" onclick="resetAll()">Novo Sorteio</button>
  </div>
</div>

<script>
  let participants = [];

  function addParticipant() {
    const nameEl = document.getElementById('input-name');
    const couponsEl = document.getElementById('input-coupons');
    const errEl = document.getElementById('error-msg');
    const name = nameEl.value.trim();
    const coupons = parseInt(couponsEl.value);

    errEl.textContent = '';

    if (!name) { errEl.textContent = 'Informe o nome do participante.'; return; }
    if (!coupons || coupons < 1) { errEl.textContent = 'Informe ao menos 1 cupom.'; return; }
    if (participants.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      errEl.textContent = 'Participante já registrado.'; return;
    }

    participants.push({ name, coupons, id: Date.now() });
    nameEl.value = '';
    couponsEl.value = '';
    nameEl.focus();
    renderList();
  }

  function removeParticipant(id) {
    participants = participants.filter(p => p.id !== id);
    renderList();
  }

  function renderList() {
    const list = document.getElementById('list');
    const totalInfo = document.getElementById('total-info');
    const totalCount = document.getElementById('total-count');
    const btn = document.getElementById('btn-raffle');

    if (participants.length === 0) {
      list.innerHTML = '<div class="empty-state">Nenhum participante ainda</div>';
      totalInfo.style.display = 'none';
      btn.disabled = true;
      return;
    }

    list.innerHTML = participants.map(p => `
      <div class="participant-item">
        <span class="p-name">${p.name}</span>
        <span class="p-coupons">🎟 ${p.coupons}</span>
        <button class="p-remove" onclick="removeParticipant(${p.id})" title="Remover">×</button>
      </div>
    `).join('');

    const total = participants.reduce((s, p) => s + p.coupons, 0);
    totalCount.textContent = total;
    totalInfo.style.display = 'block';
    btn.disabled = participants.length < 2;
  }

  function buildPool() {
    const pool = [];
    participants.forEach(p => {
      for (let i = 0; i < p.coupons; i++) pool.push(p);
    });
    return pool;
  }

  function pickWinner(pool) {
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function startRaffle() {
    const pool = buildPool();
    const winner = pickWinner(pool);

    const names = [];
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    for (let i = 0; i < 40; i++) names.push(shuffled[i % shuffled.length].name);
    names.push(winner.name);

    const overlay = document.getElementById('roulette-overlay');
    const rList = document.getElementById('roulette-list');
    overlay.classList.add('active');

    const ITEM_H = 54;
    rList.innerHTML = names.map(n => `<div class="roulette-item">${n}</div>`).join('');

    const totalH = names.length * ITEM_H;
    const windowH = 200;
    const centerOffset = (windowH / 2) - (ITEM_H / 2);
    const targetIndex = names.length - 1;
    const targetY = -(targetIndex * ITEM_H - centerOffset);

    let startY = centerOffset;
    rList.style.transform = `translateY(${startY}px)`;

    const duration = 5000;
    const startTime = performance.now();
    let raf;

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    function animate(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = easeOutCubic(t);
      const currentY = startY + (targetY - startY) * eased;
      rList.style.transform = `translateY(${currentY}px)`;

      const centerItemIndex = Math.round((-currentY + centerOffset) / ITEM_H);
      document.querySelectorAll('.roulette-item').forEach((el, i) => {
        el.classList.toggle('center', i === centerItemIndex);
      });

      if (t < 1) {
        raf = requestAnimationFrame(animate);
      } else {
        cancelAnimationFrame(raf);
        setTimeout(() => showWinner(winner, overlay), 400);
      }
    }

    requestAnimationFrame(animate);
  }

  function showWinner(winner, overlay) {
    overlay.classList.remove('active');

    const ws = document.getElementById('winner-screen');
    document.getElementById('winner-name').textContent = winner.name;
    document.getElementById('winner-coupons').innerHTML = `Sorteado com <strong>${winner.coupons} cupom${winner.coupons > 1 ? 's' : ''}</strong> de um total de <strong>${buildPool().length} cupons</strong>`;
    ws.classList.add('active');

    spawnConfetti();
  }

  function spawnConfetti() {
    const container = document.getElementById('confetti');
    container.innerHTML = '';
    const colors = ['#F5A623','#FFD580','#e94560','#2ecc71','#3498db','#9b59b6','#ffffff'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${6 + Math.random() * 8}px;
        height: ${6 + Math.random() * 8}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5 + Math.random() * 2.5}s;
        animation-delay: ${Math.random() * 0.8}s;
      `;
      container.appendChild(el);
    }
  }

  function resetAll() {
    document.getElementById('winner-screen').classList.remove('active');
    document.getElementById('roulette-overlay').classList.remove('active');
  }

  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('input-coupons').focus();
  });

  document.getElementById('input-coupons').addEventListener('keydown', e => {
    if (e.key === 'Enter') addParticipant();
  });
</script>
